name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # JOB 1: Validate the model
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train and log to MLflow
        run: python train.py

      # Upload BOTH model_info.txt AND mlflow.db
      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Upload mlflow database
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-db
          path: mlflow.db

  # JOB 2: Deploy (only runs if validate passes)
  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Download BOTH files from validate job
      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Download mlflow database
        uses: actions/download-artifact@v4
        with:
          name: mlflow-db

      # Now check threshold - mlflow.db is available
      - name: Check accuracy threshold
        run: python check_threshold.py

      # Mock Docker build
      - name: Build Docker image
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"