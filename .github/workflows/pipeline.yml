name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # JOB 1: Validate the model
  validate:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download the code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Install required packages
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run training and log to MLflow
      - name: Train and log to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python train.py

      # Step 5: Upload model_info.txt so deploy job can use it
      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  # JOB 2: Deploy (only runs if validate passes)
  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      # Step 1: Download the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Install packages
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Download model_info.txt from validate job
      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model-info

      # Step 5: Check if accuracy is above 0.85
      - name: Check accuracy threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python check_threshold.py

      # Step 6: Mock Docker build
      - name: Build Docker image
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"