name: ML Training Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  linter:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install flake8
        run: pip install flake8

      - name: Run linter
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: linter

    if: |
      needs.linter.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training
        run: python train.py

      - name: Capture error logs
        if: failure()
        run: |
          echo "Training failed at $(date)" > error_logs.txt
          echo "Branch: ${{ github.ref }}" >> error_logs.txt
          echo "Commit: ${{ github.sha }}" >> error_logs.txt

      - name: Upload error logs as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt
          retention-days: 7

      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."